<!DOCTYPE html>
<html>
<head>
    <title>Edit Employee</title>

    <style>
        body {
            font-family: Arial;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
            width: 300px;
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: green;
            color: white;
            border: none;
            border-radius: 5px;
        }

        button:hover {
            background-color: darkgreen;
        }
    </style>
</head>

<body>

<div class="box">
    <h2>Edit Employee</h2>

    <form method="POST">
        <input type="text" name="name" value="{{ emp[1] }}" required>
        <input type="text" name="role" value="{{ emp[2] }}" required>
        <input type="number" name="salary" value="{{ emp[3] }}" required>

        <button type="submit">Update</button>
    </form>
</div>

</body>
</html>
